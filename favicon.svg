<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#161616"/>
  
  <!-- Grid lines — subtle -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <!-- G letter — Bebas-style bold, geometric -->
  <text x="16" y="22.5"
        font-family="Arial Black, sans-serif"
        font-weight="900"
        font-size="19"
        fill="#e8e6e1"
        text-anchor="middle"
        letter-spacing="-1">G</text>

  <!-- Small dot accent bottom-right -->
  <circle cx="25" cy="25" r="2" fill="#e8e6e1" opacity="0.4"/>
</svg>
